<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: topbar(${activeNav}, ${username})}"></header>
<div th:replace="~{fragments/layout :: toast(${toastMessage}, ${toastType})}"></div>
<main class="page-shell">
  <section class="page-header">
    <div>
      <p class="eyebrow">AppStore</p>
      <h1>浏览并安装新的应用</h1>
      <p>应用目录会优先同步 runtipi-appstore 仓库，安装后会进入你的个人应用列表。</p>
    </div>
  </section>

  <section class="panel store-search-panel">
    <label class="store-search-field" for="app-store-search">
      <span>搜索应用</span>
      <input id="app-store-search" type="search" placeholder="按名称、分类或描述筛选" data-app-store-search>
    </label>
    <p class="muted store-search-meta">
      共 <span th:text="${#lists.size(apps)}">0</span> 个应用，
      当前显示 <span data-app-store-visible-count th:text="${#lists.size(apps)}">0</span> 个
    </p>
  </section>

  <section class="store-grid" data-app-store-grid>
    <article class="store-card" th:each="app : ${apps}" data-app-store-card>
      <a class="store-card-link" th:href="@{/app-store/{slug}(slug=${app.slug})}">
        <div class="store-card-top">
          <div class="store-logo-wrap" th:style="'--accent:' + ${app.accentColor}">
            <img class="store-logo" th:src="${app.logoUrl}" th:alt="${app.name + ' logo'}">
          </div>
          <span class="category-chip" th:text="${app.category}" data-app-store-category>Category</span>
        </div>
        <div class="store-card-body">
          <h2 th:text="${app.name}" data-app-store-name>App</h2>
          <p th:text="${app.description}" data-app-store-description>Description</p>
        </div>
      </a>
      <div class="store-card-bottom">
        <span class="status-pill"
              th:if="${app.installed}"
              th:classappend="${app.status != null and app.status.name() == 'RUNNING'} ? ' status-running' : ' status-stopped'"
              th:text="${app.status}">RUNNING</span>
        <form th:if="${!app.installed}" th:action="@{/app-store/{slug}/install(slug=${app.slug})}" method="post">
          <button class="primary-button" type="submit">安装</button>
        </form>
        <a class="secondary-button link-button" th:if="${app.installed}" th:href="@{/my-apps}">去管理</a>
      </div>
    </article>
  </section>

  <div class="empty-state" data-app-store-empty hidden>
    没有匹配的应用，换个关键词再试。
  </div>
</main>
</body>
</html>
