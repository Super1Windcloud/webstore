<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: topbar(${activeNav}, ${username})}"></header>
<main class="page-shell">
  <section class="hero-panel">
    <div>
      <p class="eyebrow">App 详情</p>
      <h1 th:text="${app.name}">App</h1>
      <p th:text="${app.longDescription}">Description</p>
      <div class="store-card-bottom">
        <span class="category-chip" th:text="${app.category}">Category</span>
        <span class="status-pill" th:if="${app.installed}" th:text="${app.status}">RUNNING</span>
        <form th:if="${!app.installed}" th:action="@{/app-store/{slug}/install(slug=${app.slug})}" method="post">
          <button class="primary-button" type="submit">安装</button>
        </form>
        <form th:if="${app.installed and app.status != null and app.status.name() == 'RUNNING'}"
              th:action="@{/my-apps/{slug}/stop(slug=${app.slug})}" method="post">
          <button class="secondary-button" type="submit">停止</button>
        </form>
        <form th:if="${app.installed and app.status != null and app.status.name() == 'STOPPED'}"
              th:action="@{/my-apps/{slug}/start(slug=${app.slug})}" method="post">
          <button class="primary-button" type="submit">启动</button>
        </form>
        <a class="ghost-button link-button" th:if="${app.installed}" th:href="${app.appHomeUrl}" target="_blank" rel="noreferrer">打开网页</a>
        <form th:if="${app.installed}" th:action="@{/my-apps/{slug}/uninstall(slug=${app.slug})}" method="post">
          <button class="danger-button" type="submit">卸载</button>
        </form>
      </div>
    </div>
    <div class="detail-logo-panel" th:style="'--accent:' + ${app.accentColor}">
      <img class="detail-logo" th:src="${app.logoUrl}" th:alt="${app.name + ' logo'}">
    </div>
  </section>

  <section class="content-grid">
    <div class="panel">
      <div class="panel-head">
        <h2>基本信息</h2>
      </div>
      <div class="settings-list">
        <div><span>版本</span><strong th:text="${app.version}">Unknown</strong></div>
        <div><span>作者</span><strong th:text="${app.author}">Unknown</strong></div>
        <div><span>默认端口</span><strong th:text="${app.port}">Unknown</strong></div>
        <div><span>Tipi 版本</span><strong th:text="${app.tipiVersion}">Unknown</strong></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>兼容性</h2>
      </div>
      <div class="settings-list">
        <div>
          <span>支持架构</span>
          <strong th:text="${#lists.isEmpty(app.architectures) ? 'Unknown' : #strings.listJoin(app.architectures, ', ')}">Unknown</strong>
        </div>
        <div>
          <span>源码地址</span>
          <a th:if="${app.sourceUrl != null}" th:href="${app.sourceUrl}" target="_blank" rel="noreferrer">打开仓库</a>
          <strong th:if="${app.sourceUrl == null}">Unknown</strong>
        </div>
      </div>
    </div>
  </section>

  <section class="panel"
           th:if="${app.metadataDescription != null and !#strings.isEmpty(app.metadataDescription)}">
    <div class="panel-head">
      <h2>Description</h2>
    </div>
    <div class="markdown-block" th:utext="${app.metadataDescriptionHtml}">description</div>
  </section>
</main>
</body>
</html>
