<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: topbar(${activeNav}, ${username})}"></header>
<main class="page-shell">
  <section class="hero-panel">
    <div>
      <p class="eyebrow">控制面板</p>
      <h1>欢迎回来，<span th:text="${username}">user</span></h1>
      <p>
        这里汇总你当前的已安装应用、运行状态，以及主机
        <span th:text="${systemOverview.hostName}">localhost</span> 的资源使用情况。
      </p>
    </div>
    <div class="hero-metrics">
      <div class="metric-card">
        <span>总应用</span>
        <strong th:text="${summary.totalApps}">0</strong>
      </div>
      <div class="metric-card">
        <span>已安装</span>
        <strong th:text="${summary.installedApps}">0</strong>
      </div>
      <div class="metric-card">
        <span>运行中</span>
        <strong th:text="${summary.runningApps}">0</strong>
      </div>
      <div class="metric-card">
        <span>已停止</span>
        <strong th:text="${summary.stoppedApps}">0</strong>
      </div>
    </div>
  </section>

  <section class="panel system-panel">
    <div class="panel-head">
      <h2>主机资源</h2>
      <span class="muted" th:text="${systemOverview.hostName}">localhost</span>
    </div>
    <div class="system-grid">
      <article class="metric-card">
        <span th:text="${systemOverview.diskSpace.title}">磁盘空间</span>
        <strong th:text="${systemOverview.diskSpace.primaryValue}">0%</strong>
        <small th:text="${systemOverview.diskSpace.secondaryValue}">0 GB / 0 GB 已使用</small>
      </article>
      <article class="metric-card">
        <span th:text="${systemOverview.cpuLoad.title}">CPU负载</span>
        <strong th:text="${systemOverview.cpuLoad.primaryValue}">0%</strong>
        <small th:text="${systemOverview.cpuLoad.secondaryValue}">0 核可用</small>
      </article>
      <article class="metric-card">
        <span th:text="${systemOverview.memoryUsage.title}">内存占用</span>
        <strong th:text="${systemOverview.memoryUsage.primaryValue}">0%</strong>
        <small th:text="${systemOverview.memoryUsage.secondaryValue}">0 GB / 0 GB 已使用</small>
      </article>
    </div>
  </section>

  <section class="content-grid">
    <div class="panel">
      <div class="panel-head">
        <h2>最近安装</h2>
        <a th:href="@{/my-apps}">查看全部</a>
      </div>
      <div class="list-stack" th:if="${!#lists.isEmpty(recentApps)}">
        <article class="list-item" th:each="app : ${recentApps}">
          <a class="store-logo-wrap app-entry-link" th:href="@{/my-apps/{slug}(slug=${app.slug})}" th:style="'--accent:' + ${app.accentColor}">
            <img class="store-logo" th:src="${app.logoUrl}" th:alt="${app.name + ' logo'}">
          </a>
          <div>
            <a class="app-title-link" th:href="@{/my-apps/{slug}(slug=${app.slug})}">
              <strong th:text="${app.name}">App</strong>
            </a>
            <p th:text="${app.description}">Description</p>
          </div>
          <span class="status-pill" th:text="${app.status}">RUNNING</span>
        </article>
      </div>
      <div class="empty-state" th:if="${#lists.isEmpty(recentApps)}">
        还没有安装任何应用，先去 AppStore 选一个开始。
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>热门应用</h2>
        <a th:href="@{/app-store}">打开 AppStore</a>
      </div>
      <div class="store-grid compact">
        <article class="store-card" th:each="app : ${storeCards}">
          <div class="store-logo-wrap" th:style="'--accent:' + ${app.accentColor}">
            <img class="store-logo" th:src="${app.logoUrl}" th:alt="${app.name + ' logo'}">
          </div>
          <div>
            <strong th:text="${app.name}">App</strong>
            <p th:text="${app.description}">Description</p>
          </div>
        </article>
      </div>
    </div>
  </section>
</main>
</body>
</html>
