spring.application.name=webstore

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/webstore;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

server.error.include-message=always
server.forward-headers-strategy=framework

webstore.security.jwt-secret=${WEBSTORE_SECURITY_JWT_SECRET:change-this-secret-key-for-production-change-this-secret-key}
webstore.security.jwt-expiration-hours=${WEBSTORE_SECURITY_JWT_EXPIRATION_HOURS:24}
