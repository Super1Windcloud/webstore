spring.application.name=webstore

spring.datasource.url=jdbc:h2:file:./data/webstore;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

server.error.include-message=always

webstore.security.jwt-secret=change-this-secret-key-for-production-change-this-secret-key
webstore.security.jwt-expiration-hours=24
