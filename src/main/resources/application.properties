spring.application.name=webstore
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:h2:file:./data/webstore;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

spring.web.error.include-message=always
server.forward-headers-strategy=framework

webstore.security.jwt-secret=Tb7kEZEE3cU/PNyms78qKCuNfwcCepjhLd7TGdnU5L0=
webstore.security.jwt-expiration-hours=24
webstore.app-store.sync-enabled=true
webstore.app-store.zip-url=https://codeload.github.com/runtipi/runtipi-appstore/zip/refs/heads/master
webstore.app-store.raw-base-url=https://raw.githubusercontent.com/runtipi/runtipi-appstore/master/apps
webstore.app-store.refresh-hours=6
webstore.app-store.local-apps-path=./appstore/apps
webstore.app-store.local-data-path=./data/apps
webstore.app-store.docker-command=docker
webstore.app-store.local-domain=localhost
webstore.app-store.managed-network=tipi_main_network
webstore.runtime.mode=local
webstore.runtime.base-url=http://localhost:9000
webstore.runtime.api-token=
webstore.runtime.connect-timeout-seconds=5
webstore.runtime.read-timeout-seconds=60
